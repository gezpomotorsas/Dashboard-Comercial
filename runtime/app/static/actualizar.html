<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Actualizar Dashboard Comercial</title>
  <style>
    :root { font-family: system-ui, sans-serif; color: #0f172a; background: #f8fafc; }
    body { max-width: 560px; margin: 48px auto; padding: 0 16px; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; box-shadow: 0 8px 24px rgba(15,23,42,.06); }
    h1 { font-size: 1.35rem; margin: 0 0 8px; }
    p { color: #475569; line-height: 1.5; }
    .meta { font-size: .9rem; background: #f1f5f9; padding: 12px; border-radius: 8px; margin: 16px 0; white-space: pre-wrap; }
    button { appearance: none; border: 0; border-radius: 8px; padding: 10px 16px; font-weight: 600; cursor: pointer; margin-right: 8px; margin-top: 8px; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .primary { background: #0f766e; color: #fff; }
    .secondary { background: #e2e8f0; color: #0f172a; }
    .ok { color: #047857; }
    .warn { color: #b45309; }
    .err { color: #b91c1c; }
    a { color: #0f766e; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Actualizar Dashboard Comercial</h1>
    <p>Sincroniza <strong>HubSpot → Supabase</strong>, recalcula las métricas del dashboard y comprueba si hay una versión nueva de la <strong>app</strong> en GitHub.</p>
    <div id="status" class="meta">Cargando estado…</div>
    <button class="primary" id="btn-all" type="button">Actualizar Supabase y app</button>
    <button class="secondary" id="btn-check" type="button">Solo comprobar GitHub</button>
    <button class="secondary" id="btn-hubspot" type="button">Solo HubSpot</button>
    <button class="secondary" id="btn-apply" type="button">Solo descargar app</button>
    <button class="secondary" id="btn-restart" type="button" style="display:none">Reiniciar ahora</button>
    <p style="margin-top:20px"><a href="/">← Volver al dashboard</a></p>
  </div>
  <script>
    const statusEl = document.getElementById('status');
    const btnAll = document.getElementById('btn-all');
    const btnApply = document.getElementById('btn-apply');
    const btnHubspot = document.getElementById('btn-hubspot');
    const btnRestart = document.getElementById('btn-restart');

    function formatBuiltAt(iso) {
      if (!iso) return 'Sin registro';
      const date = new Date(iso);
      if (Number.isNaN(date.getTime())) return 'Sin registro';
      return new Intl.DateTimeFormat('es-CO', {
        dateStyle: 'medium',
        timeStyle: 'short',
        timeZone: 'America/Bogota',
      }).format(date);
    }

    function renderStatus(data) {
      const local = (data.local_commit || '').slice(0, 7);
      const remote = (data.remote_commit || '').slice(0, 7);
      const cls = data.update_available ? 'warn' : 'ok';
      statusEl.innerHTML =
        `<span class="${cls}">${data.message || '—'}</span>\n` +
        `Última actualización app: ${formatBuiltAt(data.built_at)}\n` +
        `Versión local: ${local}\n` +
        `GitHub: ${remote}\n` +
        (data.release_tag ? `Release: ${data.release_tag}\n` : '');
      btnApply.disabled = !data.update_available;
    }

    function setBusy(busy) {
      btnAll.disabled = busy;
      btnApply.disabled = busy || !btnApply.dataset.available;
      btnHubspot.disabled = busy;
      document.getElementById('btn-check').disabled = busy;
    }

    async function api(path, method = 'GET', body) {
      const res = await fetch(path, {
        method,
        headers: { Accept: 'application/json', 'Content-Type': 'application/json' },
        body: body ? JSON.stringify(body) : undefined,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || data.message || `Error ${res.status}`);
      return data;
    }

    async function refresh() {
      try {
        const data = await api('/api/v1/launcher/update/status');
        btnApply.dataset.available = data.update_available ? '1' : '';
        renderStatus(data);
      } catch (err) {
        statusEl.innerHTML = `<span class="err">${err.message}</span>`;
      }
    }

    document.getElementById('btn-check').addEventListener('click', refresh);

    btnAll.addEventListener('click', async () => {
      setBusy(true);
      statusEl.textContent = 'Sincronizando HubSpot → Supabase y recalculando métricas… (puede tardar 10–20 min; no cierre la app)';
      try {
        const result = await api('/api/v1/launcher/update/all', 'POST');
        statusEl.innerHTML =
          `<span class="${result.ok ? 'ok' : 'warn'}">${result.message}</span>`;
        if (result.restart_required) btnRestart.style.display = 'inline-block';
      } catch (err) {
        statusEl.innerHTML = `<span class="err">${err.message}</span>`;
      } finally {
        setBusy(false);
        await refresh();
      }
    });

    btnHubspot.addEventListener('click', async () => {
      setBusy(true);
      statusEl.textContent = 'Sincronizando HubSpot y recalculando métricas… (puede tardar varios minutos)';
      try {
        const result = await api('/api/v1/launcher/sync/hubspot', 'POST');
        statusEl.innerHTML =
          `<span class="ok">HubSpot: ${result.objects}. Asociaciones: ${result.associations}. Analítica: ${result.analytics}. Recargue el dashboard (Ctrl+F5).</span>`;
      } catch (err) {
        statusEl.innerHTML = `<span class="err">${err.message}</span>`;
      } finally {
        setBusy(false);
      }
    });

    btnApply.addEventListener('click', async () => {
      setBusy(true);
      statusEl.textContent = 'Descargando actualización de la app…';
      try {
        const result = await api('/api/v1/launcher/update/apply', 'POST');
        statusEl.innerHTML = `<span class="ok">${result.message}</span>`;
        if (result.restart_required) btnRestart.style.display = 'inline-block';
      } catch (err) {
        statusEl.innerHTML = `<span class="err">${err.message}</span>`;
      } finally {
        setBusy(false);
        await refresh();
      }
    });

    btnRestart.addEventListener('click', async () => {
      statusEl.textContent = 'Reiniciando…';
      await api('/api/v1/launcher/restart', 'POST');
    });

    refresh();
  </script>
</body>
</html>
