name: Release Windows runtime

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-runtime:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Write version.json with commit
        shell: pwsh
        run: |
          $sha = "${{ github.sha }}"
          $json = Get-Content version.json -Raw | ConvertFrom-Json
          $json.commit = $sha
          $json.built_at = (Get-Date).ToUniversalTime().ToString("o")
          $json | ConvertTo-Json -Depth 5 | Set-Content version.json

      - name: Package runtime
        shell: pwsh
        run: ./scripts/package-runtime.ps1

      - name: Build executable
        shell: pwsh
        run: |
          python -m pip install -e ".[launcher]"
          python -m PyInstaller DashboardComercial.spec --noconfirm
          Copy-Item runtime dist/DashboardComercial/runtime -Recurse -Force

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: Build ${{ github.sha }}
          body: |
            commit: ${{ github.sha }}
            Actualización automática del Dashboard Comercial (runtime.zip + exe).
          files: |
            runtime.zip
            dist/DashboardComercial/DashboardComercial.exe
          prerelease: false
          make_latest: true
